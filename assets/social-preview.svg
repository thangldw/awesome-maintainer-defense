<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Maintainer Defense Kit</title>
  <desc id="desc">Protect maintainer attention without guessing who used AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111F2D"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#B8F36B"/>
      <stop offset="1" stop-color="#43D5B0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1102" cy="126" r="180" fill="#43D5B0" opacity="0.06"/>
  <circle cx="1022" cy="526" r="225" fill="#B8F36B" opacity="0.035"/>
  <path d="M0 552 H1280" stroke="#2A3B4A"/>

  <g transform="translate(76 68)">
