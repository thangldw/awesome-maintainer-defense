    <g transform="translate(206)"><rect width="132" height="40" rx="8" fill="#142535" stroke="#365066"/><text x="18" y="26" fill="#B8F36B">REVERSIBLE</text></g>
    <g transform="translate(354)"><rect width="168" height="40" rx="8" fill="#142535" stroke="#365066"/><text x="18" y="26" fill="#B8F36B">EVIDENCE-FIRST</text></g>
