name: Link health

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check catalog links
        run: python3 scripts/check_links.py
      - name: Verify pinned Actions against upstream tags
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/verify_pins.py
