name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate catalog and generated documentation
        run: python3 scripts/validate.py
      - name: Test all kit profiles and languages
        run: python3 scripts/test_install_kit.py
      - name: Build standalone release CLI
        run: python3 scripts/build_standalone.py
      - name: Verify committed release visuals
        run: python3 scripts/verify_release_assets.py
