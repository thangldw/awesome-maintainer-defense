name: Báo lỗi
description: Báo cáo một lỗi có thể tái hiện.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: Vui lòng tìm báo cáo hiện có và xóa secret hoặc dữ liệu cá nhân trước khi gửi.
  - type: input
    id: version
    attributes:
      label: Phiên bản hoặc commit bị ảnh hưởng
      placeholder: v1.2.3 hoặc commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Môi trường
      description: Hệ điều hành, runtime, package manager, kiến trúc và phiên bản dependency liên quan.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Cách tái hiện tối thiểu
      description: Cung cấp các bước theo thứ tự, repository hoặc đoạn mã nhỏ nhất có thể tái hiện lỗi.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Hành vi thực tế
      description: Đính kèm lỗi hoặc log đầy đủ sau khi xóa secret.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Hành vi mong đợi
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Xác nhận
      options:
        - label: Tôi đã tái hiện lỗi trên phiên bản còn được hỗ trợ.
          required: true
        - label: Tôi không đưa credential, token hoặc dữ liệu cá nhân vào báo cáo.
          required: true
