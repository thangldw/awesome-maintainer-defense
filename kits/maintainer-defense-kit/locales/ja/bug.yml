name: バグ報告
description: 再現可能な不具合を報告します。
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: 既存の報告を検索し、送信前にシークレットや個人データを削除してください。
  - type: input
    id: version
    attributes:
      label: 影響を受けるバージョンまたはコミット
      placeholder: v1.2.3 またはコミットSHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 環境
      description: OS、ランタイム、パッケージマネージャー、アーキテクチャ、関連する依存関係のバージョン。
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 最小再現手順
      description: 問題を再現する最小の手順、リポジトリ、またはコード例を順番に示してください。
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の挙動
      description: シークレットを削除した完全なエラーまたはログを添付してください。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する挙動
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: 確認
      options:
        - label: サポート対象バージョンで再現しました。
          required: true
        - label: 認証情報、トークン、個人データを含めていません。
          required: true
