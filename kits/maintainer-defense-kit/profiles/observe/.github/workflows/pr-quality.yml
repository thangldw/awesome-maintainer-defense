name: PR quality observation

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]

# Read-only observation. This workflow never checks out or executes PR code.
permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - name: Record submission quality signals in the job summary
        uses: peakoss/anti-slop@57858eead489d08b255fab2af45a506c2ca6eab2 # v0
        with:
          max-failures: 4
          close-pr: false
          lock-pr: false
          exempt-draft-prs: true
          # Disable identity/history heuristics and style proxies in the baseline.
          # Keep observation focused on scope, reproducibility, and repository hygiene.
          detect-spam-usernames: false
          min-account-age: 0
          max-daily-forks: 0
          require-public-profile: false
          min-profile-completeness: 0
          min-global-merge-ratio: 0
          require-commit-author-match: false
          max-description-length: 0
          max-emoji-count: 0
          max-code-references: 0
          blocked-paths: ""
          max-added-comments: 0
